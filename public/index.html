<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联网网页演示</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="hero__content">
          <p class="eyebrow">Online Web Page</p>
          <h1>这是一个可以通过服务器访问的联网网页</h1>
          <p class="intro">
            页面会从公网 API 获取实时信息，并在浏览器里显示请求状态。后续可以直接部署到云服务器、Vercel、Netlify 或宝塔面板。
          </p>
          <div class="actions">
            <button id="refreshButton" type="button">刷新联网数据</button>
            <a href="https://github.com" target="_blank" rel="noreferrer">测试外部链接</a>
          </div>
        </div>
        <div class="signal" aria-label="联网状态">
          <span></span>
          <strong id="connectionStatus">正在检查网络</strong>
        </div>
      </section>

      <section class="dashboard" aria-label="实时数据">
        <article class="panel">
          <span class="label">公网格言</span>
          <p id="quoteText">正在从 GitHub API 读取...</p>
        </article>
        <article class="panel">
          <span class="label">网络时间</span>
          <p id="timeText">正在从 WorldTime API 读取...</p>
        </article>
        <article class="panel">
          <span class="label">浏览器状态</span>
          <p id="browserText">正在检测...</p>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
