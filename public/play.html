<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玩 | 萌宠互动</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="playroom-shell" data-mode="play">
      <header class="room-header">
        <a class="back-link" href="./index.html">回到转盘</a>
        <div>
          <p class="kicker">Play room</p>
          <h1>陪玩时间。</h1>
        </div>
        <p class="room-meter">互动 <strong id="actionCount">0</strong> 次</p>
      </header>

      <section class="interactive-room interactive-room--play" aria-label="玩互动房间">
        <div class="room-effects" aria-hidden="true">
          <span class="fx fx-speed"></span>
          <span class="fx fx-note">♪</span>
          <span class="fx fx-word">贴贴</span>
        </div>

        <div class="pet-zone" id="petZone">
          <div class="css-pet" id="cssPet" aria-label="等待玩耍的萌宠" role="img">
            <span class="pet-ear pet-ear--left"></span>
            <span class="pet-ear pet-ear--right"></span>
            <span class="pet-head">
              <span class="pet-mark"></span>
              <span class="pet-eye pet-eye--left"></span>
              <span class="pet-eye pet-eye--right"></span>
              <span class="pet-mouth"></span>
            </span>
            <span class="pet-body">
              <span class="pet-paw pet-paw--left"></span>
              <span class="pet-paw pet-paw--right"></span>
              <span class="pet-belly"></span>
            </span>
            <span class="pet-tail"></span>
            <span class="pet-sleep"></span>
          </div>
          <p class="pet-status" id="petStatus">叼着空气等你陪它玩。</p>
        </div>

        <div class="item-field" aria-label="玩具区">
          <button class="play-item play-item--play" type="button" data-kind="toy" style="--x: 9%; --y: 18%">🎾</button>
          <button class="play-item play-item--play" type="button" data-kind="toy" style="--x: 76%; --y: 17%">🥎</button>
          <button class="play-item play-item--play" type="button" data-kind="toy" style="--x: 16%; --y: 70%">🧶</button>
          <button class="play-item play-item--play" type="button" data-kind="toy" style="--x: 74%; --y: 66%">🥏</button>
          <button class="play-item play-item--play" type="button" data-kind="toy" style="--x: 46%; --y: 10%">🪀</button>
        </div>
      </section>
    </main>

    <script src="./state-room.js"></script>
  </body>
</html>
