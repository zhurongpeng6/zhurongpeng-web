<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>萌宠代码复刻</title>
    <style>
      :root {
        --ink: #3b2a22;
        --fur: #fff3d8;
        --fur-light: #fffaf0;
        --inner-ear: #d6b692;
        --inner-ear-soft: #ead7bc;
        --eye: #4e82ce;
        --scarf: #343235;
        --spot: #a89a8b;
        --paper: #fff9ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at center, #fffdf8 0 34%, transparent 66%),
          linear-gradient(135deg, #fff8e8, #f3dfbd);
      }

      .stage {
        width: min(96vw, 900px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        background: var(--paper);
      }

      .mascot {
        width: min(92vw, 760px);
        height: auto;
        overflow: visible;
        filter: drop-shadow(0 28px 18px rgba(59, 42, 34, 0.14));
      }

      .outline {
        stroke: var(--ink);
        stroke-width: 22;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 15;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .thin {
        fill: none;
        stroke: var(--ink);
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .fur {
        fill: var(--fur);
      }

      .fur-light {
        fill: var(--fur-light);
      }

      .ear {
        fill: var(--inner-ear);
      }

      .ear-soft {
        fill: var(--inner-ear-soft);
      }

      .eye {
        fill: var(--eye);
      }

      .dark {
        fill: var(--ink);
      }

      .scarf {
        fill: var(--scarf);
      }

      .spot {
        fill: var(--spot);
        opacity: 0.76;
      }
    </style>
  </head>
