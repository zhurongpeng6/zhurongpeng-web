<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>荒野卷轴 | 炫技精选</title>
    <link rel="stylesheet" href="./featured.css" />
  </head>
  <body class="featured-body" data-featured="western">
    <a class="fx-back" href="./index.html">返回转盘</a>
    <main class="western-page">
      <section class="fx-copy">
        <p class="fx-kicker">Infinite Scroll Parallax</p>
        <h1 class="fx-title">荒野卷轴</h1>
        <p class="fx-lead">以荒野、西部、尘土、日落和孤骑为视觉母题，做横向无限视差卷轴。</p>
      </section>
      <section class="western-track" aria-label="荒野视差画廊">
        <article class="parallax-card" style="--art: linear-gradient(160deg, #291408, #b7672a 42%, #f5b35e 62%, #2e1d14)">
          <h2>黄昏驿站</h2><p>马蹄声从远处贴着地平线滚来。</p>
        </article>
        <article class="parallax-card" style="--art: linear-gradient(160deg, #120c09, #4c2a19 36%, #af6b38 58%, #0f172a)">
          <h2>峡谷枪烟</h2><p>岩壁遮住一半太阳，也遮住一半命运。</p>
        </article>
        <article class="parallax-card" style="--art: linear-gradient(160deg, #1a1007, #80521e 36%, #e3a84e 55%, #18181b)">
          <h2>孤骑过河</h2><p>水面很慢，追兵很快。</p>
        </article>
        <article class="parallax-card" style="--art: linear-gradient(160deg, #0f1218, #27364f 40%, #d97706 68%, #09090b)">
          <h2>暴雨来临</h2><p>风先抵达，雷声随后把夜幕按下。</p>
        </article>
        <article class="parallax-card" style="--art: linear-gradient(160deg, #22140c, #5b3423 44%, #f59e0b 68%, #111827)">
          <h2>最后篝火</h2><p>荒野从不回答，只把故事烧成灰。</p>
        </article>
      </section>
    </main>
    <script src="./featured.js"></script>
  </body>
</html>
