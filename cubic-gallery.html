<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>立方画廊 | 炫技精选</title>
    <link rel="stylesheet" href="./featured.css" />
  </head>
  <body class="featured-body" data-featured="cubic">
    <a class="fx-back" href="./index.html">返回转盘</a>
    <main class="cubic-page">
      <section class="cubic-sticky">
        <div class="fx-copy" style="position:absolute;top:0;left:50%;translate:-50% 0;pointer-events:none">
          <p class="fx-kicker">Cubic Scrollable Gallery</p>
          <h1 class="fx-title">立方画廊</h1>
        </div>
        <div class="cubic-gallery" aria-label="滚动立方图片画廊">
          <article class="cubic-panel" style="--i: 0; --art: linear-gradient(135deg, #24111f, #b51d3d 46%, #f4c06b)">
            <h2>辩护</h2><p>滚动时画面像立方体翻面，重点是镜头不跳。</p>
          </article>
          <article class="cubic-panel" style="--i: 1; --art: linear-gradient(160deg, #d9efff, #8399b8 48%, #1f2a3d)">
            <h2>凛冬</h2><p>每一面都是上一页对立图像的再利用。</p>
          </article>
          <article class="cubic-panel" style="--i: 2; --art: linear-gradient(135deg, #0f1028, #e11d48 48%, #06b6d4)">
            <h2>午夜</h2><p>scroll progress 驱动 3D 旋转，形成连续画廊。</p>
          </article>
          <article class="cubic-panel" style="--i: 3; --art: linear-gradient(145deg, #0d1724, #3b1d2c 50%, #f97316)">
            <h2>风暴</h2><p>一比一复刻核心感受：滚动、立方、图片主导。</p>
          </article>
          <article class="cubic-panel" style="--i: 4; --art: linear-gradient(135deg, #18142f, #7c3aed 46%, #22d3ee)">
            <h2>壁画</h2><p>大面板、强透视、慢速滚动，保留冲击力。</p>
          </article>
        </div>
      </section>
    </main>
    <script src="./featured.js"></script>
  </body>
</html>
